services:
  - type: web
    name: neubaitics-lms-api
    runtime: python
    plan: free
    buildCommand: bash backend/build.sh
    startCommand: cd backend && python -m gunicorn lms_api.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: neubaitics-lms-api.onrender.com
      - key: FRONTEND_BASE_URL
        value: https://your-vercel-app.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-vercel-app.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: neubaitics-lms-db
          property: connectionString

databases:
  - name: neubaitics-lms-db
    plan: free
